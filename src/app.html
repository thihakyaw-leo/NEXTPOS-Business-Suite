<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0a0e1a" />
		<meta name="description" content="KT POS Business Suite - Modern retail point-of-sale system" />
		<title>KT POS Business Suite</title>
		<script>
			(() => {
				const storageKey = 'kt-pos-theme';

				try {
					const storedTheme = localStorage.getItem(storageKey);
					const theme =
						storedTheme === 'light' || storedTheme === 'dark'
							? storedTheme
							: window.matchMedia('(prefers-color-scheme: dark)').matches
								? 'dark'
								: 'light';

					document.documentElement.classList.toggle('dark', theme === 'dark');
					document.documentElement.dataset.theme = theme;
					document.documentElement.style.colorScheme = theme;
					document
						.querySelector('meta[name="theme-color"]')
						?.setAttribute('content', theme === 'dark' ? '#07101d' : '#f6f1e8');
				} catch {
					// Ignore storage and matchMedia errors during initial paint.
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
